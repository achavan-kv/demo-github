name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # SETUP PYTHON
      # ==========================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==========================================
      # INSTALL DEPENDENCIES
      # ==========================================

      - name: Install dependencies
        run: |
          pip install requests

      # ==========================================
      # GENERATE PR DIFF
      # ONLY .CS + .SQL FILES
      # ==========================================

      - name: Generate PR Diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD \
            -- '*.cs' '*.sql' \
            > pr.diff

          echo "========== PR DIFF =========="
          cat pr.diff

      # ==========================================
      # RUN CLAUDE REVIEW
      # ==========================================

      - name: Run Claude Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python .github/scripts/claude_review.py

      # ==========================================
      # PRINT REVIEW
      # ==========================================

      - name: Print Claude Review
        run: |
          echo "========== CLAUDE REVIEW =========="
          cat comment.txt

      # ==========================================
      # POST REVIEW TO PR
      # ==========================================

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let comment = fs.readFileSync('comment.txt', 'utf8');

            // ==========================================
            // FORMAT REVIEW OUTPUT
            // ==========================================

            comment = comment
              .replaceAll(
                'Problem:',
                '🔴 <span style="color:red"><strong>Problem:</strong></span>'
              )
              .replaceAll(
                'Risk:',
                '🔴 <span style="color:red"><strong>Risk:</strong></span>'
              )
              .replaceAll(
                'Recommendation:',
                '🟢 <span style="color:green"><strong>Recommendation:</strong></span>'
              )
              .replaceAll(
                '[Critical]',
                '🚨 <strong><span style="color:red">[Critical]</span></strong>'
              )
              .replaceAll(
                '[High]',
                '🟠 <strong><span style="color:orange">[High]</span></strong>'
              )
              .replaceAll(
                '[Medium]',
                '🟡 <strong><span style="color:#b59b00">[Medium]</span></strong>'
              )
              .replaceAll(
                '[Low]',
                '🔵 <strong><span style="color:blue">[Low]</span></strong>'
              );

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `# Claude AI Review\n\n${comment}`
            });

      # ==========================================
      # FAIL PIPELINE FOR CRITICAL/HIGH
      # ==========================================

      - name: Validate Claude Review Result
        run: |
          echo "Checking for blocking issues..."

          if grep -E "\[Critical\]|\[High\]" comment.txt; then
            echo ""
            echo "========================================="
            echo "CLAUDE REVIEW FAILED"
            echo "Critical/High severity issues detected."
            echo "Pull Request cannot be approved."
            echo "========================================="
            exit 1
          fi

          echo "No blocking issues detected."
